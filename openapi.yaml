openapi: 3.1.0
info:
  title: Smart Campus Access Policy API
  version: 1.0.0
  description: >
    Contract-first API giữa Access Control Service (Consumer)
    và Core Policy Service (Provider) để tra cứu và đánh giá chính sách truy cập.
servers:
  - url: http://localhost:4010
    description: Prism mock server
tags:
  - name: health
  - name: policies
security:
  - bearerAuth: []

paths:
  /health:
    get:
      operationId: getHealth
      summary: Kiểm tra trạng thái service
      tags: [health]
      security: []
      responses:
        '200':
          description: Service hoạt động bình thường
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  /policies:
    get:
      operationId: listPolicies
      summary: Lấy danh sách chính sách truy cập
      tags: [policies]
      parameters:
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Danh sách chính sách
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyPage'

  /policies/{policyId}:
    get:
      operationId: getPolicyById
      summary: Lấy chi tiết một chính sách
      tags: [policies]
      parameters:
        - name: policyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Thông tin chính sách
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessPolicy'
        '404':
          $ref: '#/components/responses/NotFound'

  /access-decisions:
    post:
      operationId: evaluateAccess
      summary: Đánh giá quyền truy cập
      tags: [policies]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessEvaluationRequest'
      responses:
        '200':
          description: Kết quả đánh giá truy cập
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDecision'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /access-decisions/{decisionId}:
    get:
      operationId: getDecisionById
      summary: Tra cứu quyết định truy cập đã tạo
      tags: [policies]
      parameters:
        - name: decisionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Chi tiết quyết định
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDecision'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    BadRequest:
      description: Dữ liệu đầu vào không hợp lệ
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    UnprocessableEntity:
      description: Không thể xử lý nghiệp vụ
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    InternalServerError:
      description: Lỗi hệ thống
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    NotFound:
      description: Không tìm thấy tài nguyên
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      required: [status, service, time]
      properties:
        status:
          type: string
          const: ok
        service:
          type: string
        time:
          type: string
          format: date-time

    PolicyPage:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AccessPolicy'
        total:
          type: integer

    AccessPolicy:
      type: object
      required:
        - id
        - policyName
        - resourceType
        - allowedRoles
        - status
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        policyName:
          type: string
        description:
          type: [string, "null"]
        resourceType:
          type: string
          enum: [BUILDING, ROOM, LAB, PARKING]
        allowedRoles:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
        createdAt:
          type: string
          format: date-time

    AccessEvaluationRequest:
      type: object
      required:
        - userId
        - role
        - resourceId
        - resourceType
        - accessMethod
      properties:
        userId:
          type: string
          format: uuid
        role:
          type: string
        resourceId:
          type: string
        resourceType:
          type: string
        accessMethod:
          $ref: '#/components/schemas/AccessMethod'

    AccessMethod:
      oneOf:
        - $ref: '#/components/schemas/CardMethod'
        - $ref: '#/components/schemas/FaceMethod'
      discriminator:
        propertyName: methodType
        mapping:
          CARD: '#/components/schemas/CardMethod'
          FACE: '#/components/schemas/FaceMethod'

    CardMethod:
      type: object
      required: [methodType, cardId]
      properties:
        methodType:
          type: string
          const: CARD
        cardId:
          type: string

    FaceMethod:
      type: object
      required: [methodType, faceToken]
      properties:
        methodType:
          type: string
          const: FACE
        faceToken:
          type: string

    AccessDecision:
      type: object
      required:
        - decisionId
        - result
        - reason
        - evaluatedAt
      properties:
        decisionId:
          type: string
          format: uuid
        result:
          type: string
          enum: [ALLOW, DENY]
        reason:
          type: string
        matchedPolicyId:
          type: [string, "null"]
          format: uuid
        evaluatedAt:
          type: string
          format: date-time

    ProblemDetails:
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: [string, "null"]
        instance:
          type: [string, "null"]
          format: uri
